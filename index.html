<!-- ADD ACTIVITY -->
<section class="card add-card">
  <div>
    <h2>Add activity</h2>

    <label for="activitySelect">Activity</label>
    <select id="activitySelect"></select>

    <br><br>

    <label for="quantityInput">Quantity</label>
    <input id="quantityInput" type="number" min="0" step="0.1" value="1" />

    <div class="button-row">
      <button id="addBtn">Add activity</button>
      <button id="resetBtn" class="secondary">Reset log</button>
    </div>
  </div>

  <div id="activityInfo" class="activity-detail"></div>
</section>

<!-- ✅ MOVED HERE -->
<section class="card log-card">
  <h2>Activity log</h2>
  <div id="activityLog"></div>
</section>

<!-- GUIDELINES BELOW -->
<section class="grid limit-grid">
  <div class="card limit-card">
    <h2>Adult yearly guidance</h2>
    <div class="big-number">1 mSv</div>
    <p>Recommended public exposure benchmark per year.</p>
  </div>

  <div class="card limit-card child">
    <h2>Child yearly guidance</h2>
    <div class="big-number">≤ 1 mSv</div>
    <p>Keep exposure as low as reasonably achievable.</p>
  </div>

  <div class="card limit-card medical">
    <h2>Medical radiation</h2>
    <div class="big-number">Doctor-led</div>
    <p>Medical scans may exceed limits when necessary.</p>
  </div>
</section>
