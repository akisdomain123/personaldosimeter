<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyRadiationTracker</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #eef2ff;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #4f46e5;
      color: white;
      cursor: pointer;
    }

    input, select {
      padding: 10px;
      width: 100%;
      margin-bottom: 10px;
    }

    .log-item {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 10px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
<div class="container">

  <h1>☢ MyRadiationTracker</h1>

  <div class="card">
    <h2>Total Dose</h2>
    <div id="totalDose">0 µSv</div>
  </div>

  <div class="card">
    <h2>Add Activity</h2>

    <select id="activitySelect"></select>
    <input id="quantityInput" type="number" value="1"/>

    <button onclick="addItem()">Add</button>
    <button onclick="clearAll()">Clear All</button>
  </div>

  <div class="card">
    <h2>Activity Log</h2>
    <div id="activityLog"></div>
  </div>

</div>

<script>
const activities = [
  { name: "Dental X-ray", doseUSv: 5 },
  { name: "Chest X-ray", doseUSv: 100 },
  { name: "CT scan", doseUSv: 7000 },
  { name: "Flight 5 hours", doseUSv: 17.5 }
];

const select = document.getElementById("activitySelect");
select.innerHTML = activities.map((a,i)=>`<option value="${i}">${a.name}</option>`).join("");

function getLogs() {
  return JSON.parse(localStorage.getItem("rad_logs") || "[]");
}

function saveLogs(logs) {
  localStorage.setItem("rad_logs", JSON.stringify(logs));
}

function addItem() {
  const logs = getLogs();
  const activity = activities[select.value];
  const qty = parseFloat(document.getElementById("quantityInput").value);

  logs.push({
    id: Date.now(),
    name: activity.name,
    totalUSv: activity.doseUSv * qty
  });

  saveLogs(logs);
  render();
}

function clearAll() {
  localStorage.removeItem("rad_logs");
  render();
}

function deleteItem(id) {
  let logs = getLogs();
  logs = logs.filter(l => l.id !== id);
  saveLogs(logs);
  render();
}

function render() {
  const logs = getLogs();
  const total = logs.reduce((s,l)=>s+l.totalUSv,0);

  document.getElementById("totalDose").innerText = total + " µSv";

  const container = document.getElementById("activityLog");

  container.innerHTML = logs.length ? logs.map(l => `
    <div class="log-item">
      <div>${l.name} (${l.totalUSv} µSv)</div>
      <button onclick="deleteItem(${l.id})">X</button>
    </div>
  `).join("") : "No logs yet";
}

render();
</script>

</body>
</html>
