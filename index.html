<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MyRadiationTracker</title>

<style>
body { margin:0; font-family: Arial; background:#eef2ff; }
.container { max-width:1000px; margin:auto; padding:20px; }
.card { background:white; padding:20px; border-radius:16px; margin-bottom:20px; }
button { padding:10px; border:none; border-radius:10px; background:#4f46e5; color:white; cursor:pointer; }
input, select { width:100%; padding:10px; margin-bottom:10px; }
.log-item { display:flex; justify-content:space-between; border:1px solid #ddd; padding:10px; border-radius:10px; margin-bottom:10px; }
</style>
</head>

<body>
<div class="container">

<h1>☢ MyRadiationTracker</h1>

<!-- SUMMARY -->
<div class="card">
  <h2>Total Dose</h2>
  <div id="totalDose">0 µSv</div>
</div>

<!-- ADD -->
<div class="card">
  <h2>Add Activity</h2>
  <select id="activitySelect"></select>
  <input id="quantityInput" type="number" value="1"/>
  <button onclick="addItem()">Add</button>
  <button onclick="clearAll()">Clear</button>
</div>

<!-- LOG -->
<div class="card">
  <h2>Activity Log</h2>
  <div id="activityLog"></div>
</div>

</div>

<script>

/* ACTIVITIES */
const activities = [
  { name: "Dental X-ray", doseUSv: 5 },
  { name: "DEXA bone density scan", doseUSv: 1 },
  { name: "Chest X-ray", doseUSv: 100 },
  { name: "Mammogram", doseUSv: 400 },
  { name: "CT head", doseUSv: 2000 },
  { name: "CT chest", doseUSv: 7000 },
  { name: "CT abdomen / pelvis", doseUSv: 10000 },
  { name: "PET scan", doseUSv: 14000 },
  { name: "Nuclear stress test", doseUSv: 10000 },

  { name: "Flight: 1 hour", doseUSv: 3.5 },
  { name: "Short-haul flight: 2 hours", doseUSv: 7 },
  { name: "Short-haul flight: 3 hours", doseUSv: 10.5 },
  { name: "Medium-haul flight: 5 hours", doseUSv: 17.5 },
  { name: "Long-haul flight: 8 hours", doseUSv: 28 },
  { name: "Long-haul flight: 12 hours", doseUSv: 42 },
  { name: "Ultra long-haul flight: 16 hours", doseUSv: 56 },

  { name: "Banana", doseUSv: 0.1 },

  { name: "Background radiation: 1 day", doseUSv: 8.2 },
  { name: "High altitude living: 1 day", doseUSv: 0.55 },
  { name: "Radon exposure: low home (year)", doseUSv: 1000 },
  { name: "Radon exposure: moderate home (year)", doseUSv: 3000 },
  { name: "Radon exposure: high home (year)", doseUSv: 10000 },

  { name: "Working in nuclear plant (day)", doseUSv: 10 },
  { name: "Handling radioactive materials (low, day)", doseUSv: 5 },
  { name: "Interventional radiology (per procedure)", doseUSv: 50 },
  { name: "Aircrew yearly exposure", doseUSv: 3000 }
];

/* INIT DROPDOWN */
const select = document.getElementById("activitySelect");
select.innerHTML = activities.map((a,i)=>
  `<option value="${i}">${a.name} (${a.doseUSv} µSv)</option>`
).join("");

/* STORAGE */
function getLogs() {
  return JSON.parse(localStorage.getItem("rad_logs") || "[]");
}

function saveLogs(logs) {
  localStorage.setItem("rad_logs", JSON.stringify(logs));
}

/* ACTIONS */
function addItem() {
  const logs = getLogs();
  const activity = activities[select.value];
  const qty = parseFloat(document.getElementById("quantityInput").value);

  logs.push({
    id: Date.now(),
    name: activity.name,
    totalUSv: activity.doseUSv * qty
  });

  saveLogs(logs);
  render();
}

function clearAll() {
  localStorage.removeItem("rad_logs");
  render();
}

function deleteItem(id) {
  let logs = getLogs();
  logs = logs.filter(l => l.id !== id);
  saveLogs(logs);
  render();
}

/* RENDER */
function render() {
  const logs = getLogs();
  const total = logs.reduce((s,l)=>s+l.totalUSv,0);

  document.getElementById("totalDose").innerText = total + " µSv";

  const container = document.getElementById("activityLog");

  container.innerHTML = logs.length ? logs.map(l=>`
    <div class="log-item">
      <div>${l.name} (${l.totalUSv} µSv)</div>
      <button onclick="deleteItem(${l.id})">X</button>
    </div>
  `).join("") : "No logs yet";
}

render();

</script>

</body>
</html>
