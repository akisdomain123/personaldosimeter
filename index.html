<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyRadiationTracker</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --bg: #f8fafc;
      --text: #0f172a;
      --muted: #64748b;
      --card: #ffffff;
      --border: #e2e8f0;
      --primary: #4f46e5;
      --primary-dark: #312e81;
      --soft: #f1f5f9;
      --green-bg: #dcfce7;
      --green-border: #bbf7d0;
      --blue-bg: #eff6ff;
      --blue-border: #bfdbfe;
      --amber-bg: #fffbeb;
      --amber-border: #fde68a;
      --purple-bg: #f5f3ff;
      --purple-border: #ddd6fe;
      --red-bg: #fee2e2;
      --red-border: #fecaca;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, #dbeafe 0, transparent 34%),
        radial-gradient(circle at top right, #ede9fe 0, transparent 30%),
        linear-gradient(180deg, #eef2ff, var(--bg));
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 16px 42px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      font-size: 18px;
      letter-spacing: -0.03em;
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: white;
      background: linear-gradient(135deg, var(--primary), #06b6d4);
      box-shadow: var(--shadow);
    }

    .auth-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-profile {
      display: none; /* Hidden until login */
      align-items: center;
      gap: 8px;
      background: white;
      padding: 4px 12px 4px 4px;
      border-radius: 999px;
      border: 1px solid var(--border);
    }

    .user-profile img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
    }

    .badge {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(79, 70, 229, 0.10);
      color: var(--primary-dark);
      font-size: 13px;
      font-weight: 800;
    }

    h1 { margin: 14px 0 10px; font-size: 46px; line-height: 1.02; letter-spacing: -0.05em; }
    h2 { margin: 0 0 14px; font-size: 22px; letter-spacing: -0.02em; }
    h3 { margin: 0 0 8px; font-size: 17px; letter-spacing: -0.02em; }
    p { color: #475569; line-height: 1.55; margin: 0 0 12px; }
    ul { color: #475569; line-height: 1.7; margin-top: 0; }

    .grid { display: grid; gap: 18px; }
    .hero { grid-template-columns: 1.12fr 0.88fr; align-items: stretch; }

    .card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(226, 232, 240, 0.95);
      border-radius: 26px;
      padding: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .summary-card { display: flex; flex-direction: column; justify-content: center; }
    .big-number { font-size: 44px; font-weight: 950; margin: 6px 0; letter-spacing: -0.04em; }
    .small { font-size: 13px; color: var(--muted); }
    .lead { font-size: 18px; max-width: 650px; }

    .progress-label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin: 14px 0 7px;
      color: #334155;
      font-size: 13px;
      font-weight: 800;
    }

    .progress-wrap { height: 14px; background: #e2e8f0; border-radius: 999px; overflow: hidden; }
    .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), #06b6d4); transition: width 0.2s ease; }
    .progress-bar.worker { background: linear-gradient(90deg, #7c3aed, #ec4899); }

    .status { border-radius: 16px; padding: 13px; margin-top: 14px; font-weight: 800; line-height: 1.35; }
    .status.low { background: var(--green-bg); border: 1px solid var(--green-border); color: #14532d; }
    .status.medium { background: var(--amber-bg); border: 1px solid var(--amber-border); color: #78350f; }
    .status.high { background: var(--red-bg); border: 1px solid var(--red-border); color: #7f1d1d; }

    .add-card { margin-top: 20px; display: grid; grid-template-columns: 0.8fr 1.2fr; gap: 20px; align-items: start; }
    label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 800; color: #334155; }
    input, select, button { font: inherit; }
    input, select { width: 100%; padding: 13px 14px; border: 1px solid #cbd5e1; border-radius: 16px; background: white; outline: none; }
    input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12); }

    button { border: 0; border-radius: 16px; padding: 13px 16px; background: var(--primary); color: white; cursor: pointer; font-weight: 900; box-shadow: 0 10px 24px rgba(79, 70, 229, 0.22); }
    button.secondary { background: #e2e8f0; color: var(--text); box-shadow: none; }
    button.danger { background: #991b1b; box-shadow: none; }
    button:hover { transform: translateY(-1px); opacity: 0.95; }

    .button-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
    .activity-detail { border-radius: 22px; padding: 18px; background: linear-gradient(135deg, #f8fafc, #eef2ff); border: 1px solid #dbeafe; }
    .category-pill { display: inline-flex; padding: 7px 11px; border-radius: 999px; background: white; color: var(--primary-dark); border: 1px solid #c7d2fe; font-size: 13px; font-weight: 900; }
    .detail-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 14px; }
    .detail-tile { background: white; border: 1px solid var(--border); border-radius: 18px; padding: 14px; }
    .detail-value { font-size: 20px; font-weight: 950; margin-top: 4px; letter-spacing: -0.03em; }
    .guidance { margin-top: 14px; padding: 14px; border-radius: 18px; background: white; border: 1px solid var(--border); color: #334155; line-height: 1.5; }

    .limit-grid { grid-template-columns: repeat(3, 1fr); margin-top: 20px; }
    .limit-card { background: var(--green-bg); border-color: var(--green-border); }
    .limit-card.child { background: var(--blue-bg); border-color: var(--blue-border); }
